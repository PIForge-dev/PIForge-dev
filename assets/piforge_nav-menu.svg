<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" width="600" height="375" font-family="Inter, Segoe UI, sans-serif">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#072034"/><stop offset="1" stop-color="#051421"/></linearGradient></defs>
  <rect width="600" height="375" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="375" fill="#06b6d4"/>
  <text x="30" y="50" font-size="28" font-weight="800" letter-spacing="0.5"><tspan fill="#06b6d4">PI</tspan><tspan fill="#8499ab">Forge</tspan></text>
  <!-- Icon: tree navigation list (24×24 coord space, scaled 5.5×) -->
  <g transform="translate(234,72) scale(5.5)" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" color="#06b6d4">
    <!-- Vertical spine -->
    <line x1="4" y1="3" x2="4" y2="21"/>
    <!-- Branch 1 → active item (highlighted box) -->
    <line x1="4" y1="6.5" x2="8" y2="6.5"/>
    <rect x="8" y="4" width="12" height="5" rx="2.5" fill="currentColor" fill-opacity="0.2"/>
    <rect x="8" y="4" width="12" height="5" rx="2.5"/>
    <!-- Branch 2 → plain line item -->
    <line x1="4" y1="13" x2="8" y2="13"/>
    <line x1="8" y1="13" x2="19" y2="13" opacity="0.5"/>
    <!-- Branch 3 → item with status dot -->
    <line x1="4" y1="19.5" x2="8" y2="19.5"/>
    <line x1="8" y1="19.5" x2="16" y2="19.5" opacity="0.5"/>
    <circle cx="19.5" cy="19.5" r="1.6" fill="#ef4444" stroke="none"/>
  </g>
  <text x="30" y="296" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Navigation Menu</text>
  <text x="30" y="338" font-size="28" font-weight="500" fill="#9fb3c4">Auto-highlight · Live Status · Themes</text>
  <rect x="30" y="358" width="52" height="5" rx="2.5" fill="#06b6d4"/>
</svg>
